apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: elastiservices.elasti.truefoundry.com
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  labels:
    {{- include "elasti.labels" (dict "context" . "name" "elasti") | nindent 4 }}
spec:
  group: elasti.truefoundry.com
  names:
    kind: ElastiService
    listKind: ElastiServiceList
    plural: elastiservices
    singular: elastiservice
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ElastiService is the Schema for the elastiservices API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              autoscaler:
                properties:
                  name:
                    type: string
                  type:
                    enum:
                    - hpa
                    - keda
                    type: string
                required:
                - name
                - type
                type: object
              cooldownPeriod:
                default: 900
                description: |-
                  Cooldown period in seconds.
                  It tells how long a target resource can be idle before scaling it down
                format: int32
                maximum: 604800
                minimum: 0
                type: integer
              enabledPeriod:
                description: |-
                  EnabledPeriod defines when the scale-to-zero policy is active.
                  When omitted, scale-to-zero is always enabled (default behavior).
                  When specified, scale-down only occurs during the cron schedule window.
                properties:
                  duration:
                    default: 24h
                    description: |-
                      Duration specifies how long the enabled period lasts from each scheduled trigger.
                      Accepts formats like "1h", "30m", "8h", etc.
                    type: string
                  schedule:
                    default: 0 0 * * *
                    description: |-
                      Schedule is a 5-item cron expression (minute hour day month weekday).
                      Uses UTC timezone. Example: "0 9 * * 1-5" for 9 AM Monday-Friday.
                    type: string
                type: object
              probeResponse:
                description: |-
                  ProbeResponse defines synthetic HTTP responses the resolver serves locally (no proxy) while
                  scaled to zero, e.g. for load balancer health checks. First matching rule wins.
                  Each rule uses the same match fields and semantics as Gateway API HTTPRouteMatch
                  (https://gateway-api.sigs.k8s.io/reference/1.5/spec/#httproutematch): path, headers,
                  queryParams, and method are ANDed; omitted path defaults to prefix "/".
                items:
                  description: |-
                    ProbeResponseRule is one local response when an incoming request matches path, headers,
                    queryParams, and method with the same semantics as Gateway API HTTPRouteMatch
                    (https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io/v1.HTTPRouteMatch).
                    Types are defined locally so the CRD does not inherit Gateway API OpenAPI CEL rules (Kubernetes cost limits).
                  properties:
                    headers:
                      description: Headers specifies HTTP request header matchers
                        (ANDed).
                      items:
                        description: ProbeResponseHeaderMatch matches one request header.
                        properties:
                          name:
                            maxLength: 256
                            type: string
                          type:
                            description: Type is Exact or RegularExpression. Empty
                              defaults to Exact in the resolver.
                            enum:
                            - Exact
                            - RegularExpression
                            type: string
                          value:
                            maxLength: 4096
                            type: string
                        required:
                        - name
                        - value
                        type: object
                      maxItems: 16
                      type: array
                    method:
                      description: Method, when set, matches the HTTP method.
                      enum:
                      - GET
                      - HEAD
                      - POST
                      - PUT
                      - DELETE
                      - CONNECT
                      - OPTIONS
                      - TRACE
                      - PATCH
                      type: string
                    path:
                      description: Path specifies a HTTP request path matcher. Omitted
                        defaults to prefix "/" in the resolver.
                      properties:
                        type:
                          description: Type is Exact, PathPrefix, or RegularExpression.
                            Empty defaults to PathPrefix in the resolver.
                          enum:
                          - Exact
                          - PathPrefix
                          - RegularExpression
                          type: string
                        value:
                          description: Value is the path or regular expression to
                            match.
                          maxLength: 1024
                          type: string
                      type: object
                    queryParams:
                      description: QueryParams specifies HTTP query parameter matchers
                        (ANDed).
                      items:
                        description: ProbeResponseQueryParamMatch matches one query parameter.
                        properties:
                          name:
                            maxLength: 256
                            type: string
                          type:
                            enum:
                            - Exact
                            - RegularExpression
                            type: string
                          value:
                            maxLength: 1024
                            type: string
                        required:
                        - name
                        - value
                        type: object
                      maxItems: 16
                      type: array
                    response:
                      description: Response is the literal response body Elasti returns
                        with HTTP 200 when this rule matches.
                      type: string
                  required:
                  - response
                  type: object
                maxItems: 32
                type: array
              minTargetReplicas:
                description: Minimum number of replicas to scale to
                format: int32
                minimum: 1
                type: integer
              scaleTargetRef:
                description: ScaleTargetRef of the target resource to scale
                properties:
                  apiVersion:
                    description: API version of the target resource
                    enum:
                    - apps/v1
                    - argoproj.io/v1alpha1
                    type: string
                  kind:
                    description: Kind of the target resource
                    enum:
                    - deployments
                    - rollouts
                    - Deployment
                    - StatefulSet
                    - Rollout
                    type: string
                  name:
                    description: Name of the target resource
                    type: string
                required:
                - apiVersion
                - kind
                - name
                type: object
              service:
                description: Service to scale
                type: string
              triggers:
                description: Triggers to scale the target resource
                items:
                  properties:
                    metadata:
                      description: Metadata like query, serverAddress, threshold,
                        uptimeFilter etc.
                      x-kubernetes-preserve-unknown-fields: true
                    type:
                      description: Type of the trigger, currently only prometheus
                        is supported
                      enum:
                      - prometheus
                      type: string
                  required:
                  - type
                  type: object
                minItems: 1
                type: array
            required:
            - scaleTargetRef
            - service
            type: object
          status:
            properties:
              lastReconciledTime:
                description: Last time the ElastiService was reconciled
                format: date-time
                type: string
              lastScaledUpTime:
                description: Last time the ElastiService was scaled up
                format: date-time
                type: string
              mode:
                description: |-
                  Current mode of the ElastiService, either "proxy" or "serve".
                  "proxy" mode is when the ScaleTargetRef is scaled to 0 replicas.
                  "serve" mode is when the ScaleTargetRef is scaled to at least 1 replica.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
