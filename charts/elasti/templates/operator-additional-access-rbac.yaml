{{- if eq .Values.rbac.scope "Namespaced" }}
{{- if .Values.rbac.useClusterRole }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "elasti.fullname" . }}-operator-additional-access
  labels:
    {{- include "elasti-operator.commonLabels" . | nindent 4 }}
  annotations:
    {{- include "elasti-operator.commonAnnotations" . | nindent 4 }}
rules:
{{- include "elasti.operatorAdditionalRules" . | nindent 0 }}
{{- else }}
{{- range $ns := include "elasti.rbacNamespaces" . | fromYamlArray }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "elasti.fullname" $ }}-operator-additional-access
  namespace: {{ $ns }}
  labels:
    {{- include "elasti-operator.commonLabels" $ | nindent 4 }}
  annotations:
    {{- include "elasti-operator.commonAnnotations" $ | nindent 4 }}
rules:
{{- include "elasti.operatorAdditionalRules" $ | nindent 0 }}
{{- end }}
{{- end }}
{{- else }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "elasti.fullname" . }}-operator-additional-access
  labels:
    {{- include "elasti-operator.commonLabels" . | nindent 4 }}
  annotations:
    {{- include "elasti-operator.commonAnnotations" . | nindent 4 }}
rules:
{{- include "elasti.operatorAdditionalRules" . | nindent 0 }}
{{- end }}
