{{- if eq .Values.rbac.scope "Namespaced" }}
{{- range $ns := include "elasti.rbacNamespaces" . | fromYamlArray }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "elasti.fullname" $ }}-resolver-additional-access-binding
  namespace: {{ $ns }}
  labels:
    {{- include "elasti-resolver.commonLabels" $ | nindent 4 }}
  annotations:
    {{- include "elasti-resolver.commonAnnotations" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: {{ if $.Values.rbac.useClusterRole }}ClusterRole{{ else }}Role{{ end }}
  name: {{ include "elasti.fullname" $ }}-resolver-additional-access
subjects:
- kind: ServiceAccount
  name: {{ include "elasti.fullname" $ }}-resolver
  namespace: '{{ $.Release.Namespace }}'
{{- end }}
{{- else }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "elasti.fullname" . }}-resolver-additional-access-binding
  labels:
    {{- include "elasti-resolver.commonLabels" . | nindent 4 }}
  annotations:
    {{- include "elasti-resolver.commonAnnotations" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "elasti.fullname" . }}-resolver-additional-access
subjects:
- kind: ServiceAccount
  name: {{ include "elasti.fullname" . }}-resolver
  namespace: '{{ .Release.Namespace }}'
{{- end }}
