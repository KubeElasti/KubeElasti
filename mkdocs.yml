# Site
site_name: KubeElasti
site_url: https://kubeelasti.dev/
site_author: KubeElasti Authors
site_description: >-
  KubeElasti is a Kubernetes operator that automatically scales-to-zero your services when they are idle and scales them back up when they receive traffic.
extra_css:
  - assets/stylesheets/extra.css

# Repository
repo_name: KubeElasti/KubeElasti
repo_url: https://github.com/KubeElasti/KubeElasti

# Copyright
copyright: Copyright KubeElasti a Series of LF Projects, LLC

theme:
  variant: modern
  name: material
  logo: assets/images/logo/logo.svg
  favicon: assets/images/logo/favicon.ico
  custom_dir: docs/overrides
  font: 
    code: JetBrains Mono
  icon:
    tag:
      default: lucide/hash
    previous: fontawesome/solid/angle-left
    next: fontawesome/solid/angle-right
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16
  features:
    # - content.action.edit
    # - content.action.view
    # - announce.dismiss
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    # - header.autohide
    # - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.prune
    - navigation.sections
    - navigation.tabs
    # - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    # - toc.integrate
  palette:
    - scheme: slate
      primary: deep-purple
      accent: cyan
      toggle:
        icon: lucide/sun
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: pink
      toggle:
        icon: lucide/moon-star
        name: Switch to dark mode

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - zensical.extensions.preview:
      targets:
        include:
          - index.md
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:zensical.extensions.emoji.to_svg
      emoji_index: !!python/name:zensical.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: truefoundry
      repo: cruisekube
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - meta
  - blog
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
        remove_empty_space: true
      cache_safe: true

extra:
  scope: /
  # Browser chrome (theme-color / TileColor); aligns with Material `primary: teal` default palette
  theme_color: "#00796b"
  annotate:
    json: [.s2]
  status:
    new: Recently added
    deprecated: Deprecated
  social:
    - icon: fontawesome/brands/slack
      link: https://slack.cncf.io/
    - icon: fontawesome/brands/github
      link: https://github.com/KubeElasti/KubeElasti
  structured_data:
    organization:
      "@context": "https://schema.org"
      "@type": "Organization"
      name: "KubeElasti"
      url: "https://kubeelasti.dev"
      logo: "https://kubeelasti.dev/assets/images/logo/logo_white_full.png"
      sameAs:
        - "https://github.com/KubeElasti/KubeElasti"
        - "https://slack.cncf.io/"
    software:
      "@context": "https://schema.org"
      "@type": "SoftwareApplication"
      name: "KubeElasti"
      applicationCategory: "DeveloperApplication"
      operatingSystem: "Kubernetes"
      description: "KubeElasti is a Kubernetes operator that automatically scales-to-zero your services when they are idle and scales them back up when they receive traffic."
      url: "https://kubeelasti.dev"
      downloadUrl: "https://github.com/KubeElasti/KubeElasti"
      author:
        "@type": "Organization"
        name: "KubeElasti Authors"
        url: "https://github.com/KubeElasti/KubeElasti"
      license: "https://github.com/KubeElasti/KubeElasti/blob/main/LICENSE"
      programmingLanguage: "Go"
      keywords: 
        - "Kubernetes"
        - "Serverless"
        - "Auto-scaling"
        - "Scale-to-zero"
        - "Operator"
        - "Cloud Native"
    website:
      "@context": "https://schema.org"
      "@type": "WebSite"
      name: "KubeElasti Documentation"
      url: "https://kubeelasti.dev"
      description: "Official documentation for KubeElasti - Kubernetes operator for serverless auto-scaling"
      publisher:
        "@type": "Organization"
        name: "KubeElasti Authors"
        url: "https://github.com/KubeElasti/KubeElasti"
      potentialAction:
        "@type": "SearchAction"
        target: "https://kubeelasti.dev/search/?q={search_term_string}"
        "query-input": "required name=search_term_string"
    breadcrumb:
      "@context": "https://schema.org"
      "@type": "BreadcrumbList"
      itemListElement:
        - "@type": "ListItem"
          position: 1
          name: "Home"
          item: "https://kubeelasti.dev"
    documentation:
      "@context": "https://schema.org"
      "@type": "TechArticle"
      headline: "KubeElasti Documentation"
      description: "Comprehensive documentation for KubeElasti - Kubernetes operator for serverless auto-scaling"
      author:
        "@type": "Organization"
        name: "KubeElasti Authors"
        url: "https://github.com/KubeElasti/KubeElasti"
      publisher:
        "@type": "Organization"
        name: "KubeElasti Authors"
        url: "https://github.com/KubeElasti/KubeElasti"
        logo:
          "@type": "ImageObject"
          url: "https://kubeelasti.dev/assets/images/logo/logo_white_full.png"
      mainEntityOfPage:
        "@type": "WebPage"
        "@id": "https://kubeelasti.dev"
      datePublished: "2024-01-01"
      dateModified: "2025-01-01"
      articleSection: "Documentation"
      keywords:
        - "Kubernetes documentation"
        - "Serverless computing"
        - "Container orchestration"
        - "Auto-scaling"
        - "DevOps tools"

# Page tree
nav:
  - Home: index.md
  - About: 
      - Introduction: src/about/introduction.md
      - Adopters: src/about/adopters.md
      - Comparisons: 
          - Overview: src/about/comparisons/main.md
          - KubeElasti vs KEDA: src/about/comparisons/kubeelasti-vs-keda.md
          - KubeElasti vs Knative: src/about/comparisons/kubeelasti-vs-knative.md
  - Install: 
      - Installation: src/install/installation.md
      - Demo setup: src/install/demo-setup.md
      - Pre-Requisites: src/install/pre-requisites.md
      - Configuration: src/install/configure-elastiservice.md
  - Documentation:
      - Architecture:
          - Overview: src/documentation/architecture/architecture.md
          - State: src/documentation/architecture/state.md
          - Resolver: src/documentation/architecture/resolver.md
          - Operator: src/documentation/architecture/operator.md
          - Architecture FAQ: src/documentation/architecture/faq.md
      - Components:
          - Triggers: src/documentation/get-started/triggers.md
          - Scalers: src/documentation/get-started/scalers.md
          - Monitoring: src/documentation/get-started/monitoring.md
      - Development:
          - Dev Environment: src/documentation/development/env.md
          - Playground: src/documentation/development/playground.md
          - Load Testing: src/documentation/development/test-load.md
          - E2E Testing: src/documentation/development/test-e2e.md
          - Contributors: src/documentation/development/contributors.md

  - Blog:
      - Release 0.1.17: blog/posts/release-0.1.17.md
      - Scale-to-Zero: blog/posts/ScaleToZero.md
