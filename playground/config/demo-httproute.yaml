# Envoy Gateway equivalent of the Istio playground/config/demo-virtualService.yaml.
# Routes traffic for the demo target-deployment service and uses the standard
# Gateway API URLRewrite filter to rewrite the upstream Host header to the
# service in-cluster FQDN. The KubeElasti resolver reads this Host header
# (its default) to decide which target service to route to.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httpbin
  namespace: target
spec:
  parentRefs:
    - name: eg
      namespace: envoy-gateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: URLRewrite
          urlRewrite:
            hostname: target-deployment.target.svc.cluster.local
      backendRefs:
        - name: target-deployment
          port: 80
