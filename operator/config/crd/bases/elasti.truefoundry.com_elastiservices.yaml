---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: elastiservices.elasti.truefoundry.com
spec:
  group: elasti.truefoundry.com
  names:
    kind: ElastiService
    listKind: ElastiServiceList
    plural: elastiservices
    singular: elastiservice
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ElastiService is the Schema for the elastiservices API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              autoscaler:
                properties:
                  name:
                    type: string
                  type:
                    enum:
                    - hpa
                    - keda
                    type: string
                required:
                - name
                - type
                type: object
              cooldownPeriod:
                default: 900
                description: |-
                  Cooldown period in seconds.
                  It tells how long a target resource can be idle before scaling it down
                format: int32
                maximum: 604800
                minimum: 0
                type: integer
              enabledPeriod:
                description: |-
                  EnabledPeriod defines when the scale-to-zero policy is active.
                  When omitted, scale-to-zero is always enabled (default behavior).
                  When specified, scale-down only occurs during the cron schedule window.
                properties:
                  duration:
                    default: 24h
                    description: |-
                      Duration specifies how long the enabled period lasts from each scheduled trigger.
                      Accepts formats like "1h", "30m", "8h", etc.
                    type: string
                  schedule:
                    default: 0 0 * * *
                    description: |-
                      Schedule is a 5-item cron expression (minute hour day month weekday).
                      Uses UTC timezone. Example: "0 9 * * 1-5" for 9 AM Monday-Friday.
                    type: string
                type: object
              heartbeat:
                description: |-
                  Heartbeat defines synthetic HTTP responses the resolver serves locally (no proxy) while
                  scaled to zero, e.g. for load balancer health checks. First matching rule wins.
                  Each rule uses the same match fields and semantics as Gateway API HTTPRouteMatch
                  (https://gateway-api.sigs.k8s.io/reference/1.5/spec/#httproutematch): path, headers,
                  queryParams, and method are ANDed; omitted path defaults to prefix "/".
                items:
                  description: HeartbeatRule is one local response when an incoming
                    request matches Gateway API HTTPRouteMatch.
                  properties:
                    headers:
                      description: |-
                        Headers specifies HTTP request header matchers. Multiple match values are
                        ANDed together, meaning, a request must match all the specified headers
                        to select the route.
                      items:
                        description: |-
                          HTTPHeaderMatch describes how to select a HTTP route by matching HTTP request
                          headers.
                        properties:
                          name:
                            description: |-
                              Name is the name of the HTTP Header to be matched. Name matching MUST be
                              case-insensitive. (See https://tools.ietf.org/html/rfc7230#section-3.2).

                              If multiple entries specify equivalent header names, only the first
                              entry with an equivalent name MUST be considered for a match. Subsequent
                              entries with an equivalent header name MUST be ignored. Due to the
                              case-insensitivity of header names, "foo" and "Foo" are considered
                              equivalent.

                              When a header is repeated in an HTTP request, it is
                              implementation-specific behavior as to how this is represented.
                              Generally, proxies should follow the guidance from the RFC:
                              https://www.rfc-editor.org/rfc/rfc7230.html#section-3.2.2 regarding
                              processing a repeated header, with special handling for "Set-Cookie".
                            maxLength: 256
                            minLength: 1
                            pattern: ^[A-Za-z0-9!#$%&'*+\-.^_\x60|~]+$
                            type: string
                          type:
                            default: Exact
                            description: |-
                              Type specifies how to match against the value of the header.

                              Support: Core (Exact)

                              Support: Implementation-specific (RegularExpression)

                              Since RegularExpression HeaderMatchType has implementation-specific
                              conformance, implementations can support POSIX, PCRE or any other dialects
                              of regular expressions. Please read the implementation's documentation to
                              determine the supported dialect.
                            enum:
                            - Exact
                            - RegularExpression
                            type: string
                          value:
                            description: Value is the value of HTTP Header to be matched.
                            maxLength: 4096
                            minLength: 1
                            type: string
                        required:
                        - name
                        - value
                        type: object
                      maxItems: 16
                      type: array
                      x-kubernetes-list-map-keys:
                      - name
                      x-kubernetes-list-type: map
                    method:
                      description: |-
                        Method specifies HTTP method matcher.
                        When specified, this route will be matched only if the request has the
                        specified method.

                        Support: Extended
                      enum:
                      - GET
                      - HEAD
                      - POST
                      - PUT
                      - DELETE
                      - CONNECT
                      - OPTIONS
                      - TRACE
                      - PATCH
                      type: string
                    path:
                      default:
                        type: PathPrefix
                        value: /
                      description: |-
                        Path specifies a HTTP request path matcher. If this field is not
                        specified, a default prefix match on the "/" path is provided.
                      properties:
                        type:
                          default: PathPrefix
                          description: |-
                            Type specifies how to match against the path Value.

                            Support: Core (Exact, PathPrefix)

                            Support: Implementation-specific (RegularExpression)
                          enum:
                          - Exact
                          - PathPrefix
                          - RegularExpression
                          type: string
                        value:
                          default: /
                          description: Value of the HTTP path to match against.
                          maxLength: 1024
                          type: string
                      type: object
                      x-kubernetes-validations:
                      - message: value must be an absolute path and start with '/'
                          when type one of ['Exact', 'PathPrefix']
                        rule: '(self.type in [''Exact'',''PathPrefix'']) ? self.value.startsWith(''/'')
                          : true'
                      - message: must not contain '//' when type one of ['Exact',
                          'PathPrefix']
                        rule: '(self.type in [''Exact'',''PathPrefix'']) ? !self.value.contains(''//'')
                          : true'
                      - message: must not contain '/./' when type one of ['Exact',
                          'PathPrefix']
                        rule: '(self.type in [''Exact'',''PathPrefix'']) ? !self.value.contains(''/./'')
                          : true'
                      - message: must not contain '/../' when type one of ['Exact',
                          'PathPrefix']
                        rule: '(self.type in [''Exact'',''PathPrefix'']) ? !self.value.contains(''/../'')
                          : true'
                      - message: must not contain '%2f' when type one of ['Exact',
                          'PathPrefix']
                        rule: '(self.type in [''Exact'',''PathPrefix'']) ? !self.value.contains(''%2f'')
                          : true'
                      - message: must not contain '%2F' when type one of ['Exact',
                          'PathPrefix']
                        rule: '(self.type in [''Exact'',''PathPrefix'']) ? !self.value.contains(''%2F'')
                          : true'
                      - message: must not contain '#' when type one of ['Exact', 'PathPrefix']
                        rule: '(self.type in [''Exact'',''PathPrefix'']) ? !self.value.contains(''#'')
                          : true'
                      - message: must not end with '/..' when type one of ['Exact',
                          'PathPrefix']
                        rule: '(self.type in [''Exact'',''PathPrefix'']) ? !self.value.endsWith(''/..'')
                          : true'
                      - message: must not end with '/.' when type one of ['Exact',
                          'PathPrefix']
                        rule: '(self.type in [''Exact'',''PathPrefix'']) ? !self.value.endsWith(''/.'')
                          : true'
                      - message: type must be one of ['Exact', 'PathPrefix', 'RegularExpression']
                        rule: self.type in ['Exact','PathPrefix'] || self.type ==
                          'RegularExpression'
                      - message: must only contain valid characters (matching ^(?:[-A-Za-z0-9/._~!$&'()*+,;=:@]|[%][0-9a-fA-F]{2})+$)
                          for types ['Exact', 'PathPrefix']
                        rule: '(self.type in [''Exact'',''PathPrefix'']) ? self.value.matches(r"""^(?:[-A-Za-z0-9/._~!$&''()*+,;=:@]|[%][0-9a-fA-F]{2})+$""")
                          : true'
                    queryParams:
                      description: |-
                        QueryParams specifies HTTP query parameter matchers. Multiple match
                        values are ANDed together, meaning, a request must match all the
                        specified query parameters to select the route.

                        Support: Extended
                      items:
                        description: |-
                          HTTPQueryParamMatch describes how to select a HTTP route by matching HTTP
                          query parameters.
                        properties:
                          name:
                            description: |-
                              Name is the name of the HTTP query param to be matched. This must be an
                              exact string match. (See
                              https://tools.ietf.org/html/rfc7230#section-2.7.3).

                              If multiple entries specify equivalent query param names, only the first
                              entry with an equivalent name MUST be considered for a match. Subsequent
                              entries with an equivalent query param name MUST be ignored.

                              If a query param is repeated in an HTTP request, the behavior is
                              purposely left undefined, since different data planes have different
                              capabilities. However, it is *recommended* that implementations should
                              match against the first value of the param if the data plane supports it,
                              as this behavior is expected in other load balancing contexts outside of
                              the Gateway API.

                              Users SHOULD NOT route traffic based on repeated query params to guard
                              themselves against potential differences in the implementations.
                            maxLength: 256
                            minLength: 1
                            pattern: ^[A-Za-z0-9!#$%&'*+\-.^_\x60|~]+$
                            type: string
                          type:
                            default: Exact
                            description: |-
                              Type specifies how to match against the value of the query parameter.

                              Support: Extended (Exact)

                              Support: Implementation-specific (RegularExpression)

                              Since RegularExpression QueryParamMatchType has Implementation-specific
                              conformance, implementations can support POSIX, PCRE or any other
                              dialects of regular expressions. Please read the implementation's
                              documentation to determine the supported dialect.
                            enum:
                            - Exact
                            - RegularExpression
                            type: string
                          value:
                            description: Value is the value of HTTP query param to
                              be matched.
                            maxLength: 1024
                            minLength: 1
                            type: string
                        required:
                        - name
                        - value
                        type: object
                      maxItems: 16
                      type: array
                      x-kubernetes-list-map-keys:
                      - name
                      x-kubernetes-list-type: map
                    response:
                      description: Response is the literal response body Elasti returns
                        with HTTP 200 when this rule matches.
                      type: string
                  required:
                  - response
                  type: object
                type: array
              minTargetReplicas:
                description: Minimum number of replicas to scale to
                format: int32
                minimum: 1
                type: integer
              scaleTargetRef:
                description: ScaleTargetRef of the target resource to scale
                properties:
                  apiVersion:
                    description: API version of the target resource
                    enum:
                    - apps/v1
                    - argoproj.io/v1alpha1
                    type: string
                  kind:
                    description: Kind of the target resource
                    enum:
                    - deployments
                    - rollouts
                    - Deployment
                    - StatefulSet
                    - Rollout
                    type: string
                  name:
                    description: Name of the target resource
                    type: string
                required:
                - apiVersion
                - kind
                - name
                type: object
              service:
                description: Service to scale
                type: string
              triggers:
                description: Triggers to scale the target resource
                items:
                  properties:
                    metadata:
                      description: Metadata like query, serverAddress, threshold,
                        uptimeFilter etc.
                      x-kubernetes-preserve-unknown-fields: true
                    type:
                      description: Type of the trigger, currently only prometheus
                        is supported
                      enum:
                      - prometheus
                      type: string
                  required:
                  - type
                  type: object
                minItems: 1
                type: array
            required:
            - scaleTargetRef
            - service
            type: object
          status:
            properties:
              lastReconciledTime:
                description: Last time the ElastiService was reconciled
                format: date-time
                type: string
              lastScaledUpTime:
                description: Last time the ElastiService was scaled up
                format: date-time
                type: string
              mode:
                description: |-
                  Current mode of the ElastiService, either "proxy" or "serve".
                  "proxy" mode is when the ScaleTargetRef is scaled to 0 replicas.
                  "serve" mode is when the ScaleTargetRef is scaled to at least 1 replica.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
