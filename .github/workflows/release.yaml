name: Release Elasti Helm Chart

on:
  push:
    branches:
      - sd/cosign
    tags:
      - v*

permissions:
  contents: write
  packages: write

env:
  HELM_CHART_REPOSITORY: ghcr.io/kubeelasti/charts

jobs:
  # Read chart values first
  read-chart-values:
    runs-on: ubuntu-latest
    outputs:
      chart_version: ${{ steps.read_chart.outputs.CHART_VERSION }}
      app_version: ${{ steps.read_chart.outputs.APP_VERSION }}
      chart_name: ${{ steps.read_chart.outputs.CHART_NAME }}
      resolver_tag: ${{ steps.read_chart.outputs.RESOLVER_TAG }}
      operator_tag: ${{ steps.read_chart.outputs.OPERATOR_TAG }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: "0"

      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: Read chart values
        id: read_chart
        run: |
          CHART_VERSION=$(yq -r '.version' charts/elasti/Chart.yaml)
          echo "CHART_VERSION=$CHART_VERSION" >> $GITHUB_OUTPUT

          APP_VERSION=$(yq -r '.appVersion' charts/elasti/Chart.yaml)
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_OUTPUT

          CHART_NAME=$(yq -r '.name' charts/elasti/Chart.yaml)
          echo "CHART_NAME=$CHART_NAME" >> $GITHUB_OUTPUT

          RESOLVER_TAG=$(yq -r '.elastiResolver.proxy.image.tag' charts/elasti/values.yaml)
          echo "RESOLVER_TAG=$RESOLVER_TAG" >> $GITHUB_OUTPUT

          OPERATOR_TAG=$(yq -r '.elastiController.manager.image.tag' charts/elasti/values.yaml)
          echo "OPERATOR_TAG=$OPERATOR_TAG" >> $GITHUB_OUTPUT

          echo "Chart values read: $CHART_NAME v$CHART_VERSION (app v$APP_VERSION)"
          echo "Resolver tag: $RESOLVER_TAG"
          echo "Operator tag: $OPERATOR_TAG"

  # Build and push operator image
  build-operator:
    name: Build and Push Operator Docker Images
    needs: [read-chart-values]
    permissions:
      contents: read
      packages: write
      id-token: write # required for keyless cosign signing
    uses: truefoundry/github-workflows-public/.github/workflows/build.yml@main
    with:
      image_tag: ${{ needs.read-chart-values.outputs.operator_tag }}
      image_artifact_name: "elasti-operator"
      dockerfile_path: "operator/Dockerfile"
      enable_sbom: true
      enable_sign: true
      sbom_artifact_name: "sbom-elasti-operator"
      enable_jfrog: false
      enable_ghcr: true
      ghcr_repository_url: ghcr.io/${{ github.repository_owner }}

  # Build and push resolver image
  build-resolver:
    name: Build and Push Resolver Docker Images
    needs: [read-chart-values]
    permissions:
      contents: read
      packages: write
      id-token: write # required for keyless cosign signing
    uses: truefoundry/github-workflows-public/.github/workflows/build.yml@main
    with:
      image_tag: ${{ needs.read-chart-values.outputs.resolver_tag }}
      image_artifact_name: "elasti-resolver"
      dockerfile_path: "resolver/Dockerfile"
      enable_sbom: true
      enable_sign: true
      sbom_artifact_name: "sbom-elasti-resolver"
      enable_jfrog: false
      enable_ghcr: true
      ghcr_repository_url: ghcr.io/${{ github.repository_owner }}

  # Release the Helm chart
  release:
    runs-on: ubuntu-latest
    needs: [build-operator, build-resolver, read-chart-values]
    permissions:
      contents: write
      packages: write
      id-token: write # required for keyless cosign signing of the chart
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: "0"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # cosign reads Docker's credential store (~/.docker/config.json), which
      # `helm registry login` does not populate. Log in with Docker so cosign can
      # pull the pushed chart to sign it.
      - name: Log in to GHCR (for cosign)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Helm registry login
        run: |
          helm registry login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

      - name: Helm push
        id: helm_push
        run: |
          set -euo pipefail
          cd charts
          CHART_DIR=elasti
          CHART_NAME=${{ needs.read-chart-values.outputs.chart_name }}
          CHART_VERSION=${{ needs.read-chart-values.outputs.chart_version }}

          # packaging chart
          helm dependency update $CHART_DIR
          helm package $CHART_DIR

          # pushing the helm charts, capturing the pushed digest for signing
          echo "Pushing Chart: $CHART_NAME"
          echo "Version: $CHART_NAME-$CHART_VERSION.tgz"
          helm push "$CHART_NAME-$CHART_VERSION.tgz" oci://${{ env.HELM_CHART_REPOSITORY }} 2>&1 | tee push-output.txt

          DIGEST=$(grep -oE 'sha256:[a-f0-9]{64}' push-output.txt | head -n1)
          if [ -z "$DIGEST" ]; then
            echo "Error: could not determine pushed chart digest" >&2
            exit 1
          fi
          echo "Successfully pushed chart: $CHART_NAME ($DIGEST)"
          echo "chart_digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Sign Helm chart in registry (keyless)
        env:
          COSIGN_YES: 'true'
          CHART_REF: ${{ env.HELM_CHART_REPOSITORY }}/${{ needs.read-chart-values.outputs.chart_name }}@${{ steps.helm_push.outputs.chart_digest }}
        run: |
          set -euo pipefail
          echo "Signing Helm chart ${CHART_REF}"
          cosign sign --yes "${CHART_REF}"

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0
        id: syft

      - name: Generate Helm chart SBOM
        env:
          SYFT: ${{ steps.syft.outputs.cmd }}
          CHART_NAME: ${{ needs.read-chart-values.outputs.chart_name }}
          CHART_VERSION: ${{ needs.read-chart-values.outputs.chart_version }}
        run: |
          set -euo pipefail
          SBOM_FILE="charts/${CHART_NAME}-${CHART_VERSION}.sbom.spdx.json"
          echo "Generating SBOM for chart ${CHART_NAME}-${CHART_VERSION}"
          "$SYFT" scan "dir:charts/elasti" -o spdx-json="${SBOM_FILE}"
          echo "Generated SBOM: ${SBOM_FILE}"

      - name: Sign Helm chart release assets (keyless)
        env:
          COSIGN_YES: 'true'
          CHART_NAME: ${{ needs.read-chart-values.outputs.chart_name }}
          CHART_VERSION: ${{ needs.read-chart-values.outputs.chart_version }}
        run: |
          set -euo pipefail
          CHART_TGZ="charts/${CHART_NAME}-${CHART_VERSION}.tgz"
          CHART_SBOM="charts/${CHART_NAME}-${CHART_VERSION}.sbom.spdx.json"

          # cosign sign-blob --bundle emits a self-contained Sigstore bundle
          # (signature + Fulcio cert + Rekor proof). Named *.sigstore.json so they
          # are recognised by the OpenSSF Signed-Releases check as release assets.
          for f in "${CHART_TGZ}" "${CHART_SBOM}"; do
            echo "Signing ${f} -> ${f}.sigstore.json"
            cosign sign-blob --yes --bundle "${f}.sigstore.json" "${f}"
          done

      - name: Download operator image SBOM and signatures
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-operator.outputs.sbom_artifact_name }}
          path: image-sboms

      - name: Download resolver image SBOM and signatures
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-resolver.outputs.sbom_artifact_name }}
          path: image-sboms

      - name: Upload Helm chart, SBOMs and signatures to release
        uses: softprops/action-gh-release@v2
        with:
            # Chart .tgz + chart SBOM + their .sigstore.json bundles, plus the
            # per-image SBOMs and cosign signature files (.sig/.pem/.payload/.sigstore.json).
            files: |
              charts/${{ needs.read-chart-values.outputs.chart_name }}-${{ needs.read-chart-values.outputs.chart_version }}.tgz
              charts/${{ needs.read-chart-values.outputs.chart_name }}-${{ needs.read-chart-values.outputs.chart_version }}.tgz.sigstore.json
              charts/${{ needs.read-chart-values.outputs.chart_name }}-${{ needs.read-chart-values.outputs.chart_version }}.sbom.spdx.json
              charts/${{ needs.read-chart-values.outputs.chart_name }}-${{ needs.read-chart-values.outputs.chart_version }}.sbom.spdx.json.sigstore.json
              image-sboms/*
            tag_name: "${{ github.ref_name }}"
            fail_on_unmatched_files: true
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
