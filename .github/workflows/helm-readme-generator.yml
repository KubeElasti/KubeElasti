name: '[CI/CD] Update README metadata'

on:
  pull_request:
    branches:
      - 'main'
    paths:
      - 'charts/**'

permissions:
  contents: read

jobs:
  update-readme-metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Install readme-generator-for-helm
        run: npm install -g @bitnami/readme-generator-for-helm
      - name: Checkout charts
        uses: actions/checkout@v4
        with:
          ref: ${{github.event.pull_request.head.ref}}
          repository: ${{github.event.pull_request.head.repo.full_name}}
      - name: Execute readme-generator-for-helm
        env:
          DIFF_URL: '${{github.event.pull_request.diff_url}}'
          TEMP_FILE: '${{runner.temp}}/pr-${{github.event.number}}.diff'
        run: |
          # This request doesn't consume API calls.
          curl -Lkso $TEMP_FILE $DIFF_URL
          files_changed="$(sed -nr 's/[\-\+]{3} [ab]\/(.*)/\1/p' $TEMP_FILE | sort | uniq)"
          # Adding || true to avoid "Process exited with code 1" errors
          charts_dirs_changed="$(echo "$files_changed" | xargs dirname | grep '^charts/' | awk -F/ 'NF >= 2 {print $1"/"$2}'| sort -u | uniq || true)"
          for chart in ${charts_dirs_changed}; do
            echo "Updating README.md for ${chart}"
            readme-generator --values "${chart}/values.yaml" --readme "${chart}/README.md" --schema "/tmp/schema.json"
          done
      - name: Commit verified README changes
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_BRANCH: ${{ github.event.pull_request.head.ref }}
          COMMIT_MESSAGE_BODY: "Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
        run: |
          mapfile -t changed_files < <(git diff --name-only -- charts)
          if [[ ${#changed_files[@]} -eq 0 ]]; then
            echo "No README changes to commit"
            exit 0
          fi
          # Use the GraphQL createCommitOnBranch API so GitHub signs the commit
          # (shows as Verified). Plain git commit + push is always unsigned.
          .github/scripts/verified-commit.sh \
            "Update README.md with readme-generator-for-helm" \
            "${changed_files[@]}"
