# OpenSSF Scorecard (https://scorecard.dev) evaluates the security posture of the
# project against a set of automated checks and publishes the results to the
# public dashboard (https://scorecard.dev/viewer/?uri=github.com/KubeElasti/KubeElasti).
# Findings are also surfaced in the repository's code-scanning alerts.
name: Scorecard supply-chain security

on:
  # Re-run whenever branch protection rules change, since several checks depend on them.
  branch_protection_rule:
  schedule:
    - cron: "18 20 * * 1"
  push:
    branches:
      - main

# Read-only by default; the analysis job elevates only the permissions it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the results to the code-scanning dashboard.
      security-events: write
      # Needed to publish results and get a badge (see publish_results below).
      id-token: write

    steps:
      - name: "Checkout code"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: "Run analysis"
        uses: ossf/scorecard-action@05b42c624433fc40578a4040d5cf5e36ddca8cde # v2.4.2
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to the OpenSSF REST API for the Scorecard badge and the
          # public dashboard. Only runs on the default branch / scheduled events.
          publish_results: true

      # Upload the raw SARIF as a workflow artifact for debugging / retention.
      - name: "Upload artifact"
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      # Surface Scorecard findings in the repository's code-scanning alerts.
      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@ce28f5bb42b7a9f2c824e633a3f6ee835bab6858 # v3.29.0
        with:
          sarif_file: results.sarif
