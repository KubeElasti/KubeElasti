---
enableMonitoring: true
elastiController:
  manager:
    image:
      registry: local
      repository: elasti-operator
      tag: v1alpha1
    imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
elastiResolver:
  proxy:
    env:
      # Speed up probeResponse CRD cache refresh during e2e (default 5m is too slow for patch assertions).
      crdCachePollIntervalMinutes: "1"
    image:
      registry: local
      repository: elasti-resolver
      tag: v1alpha1
    imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
