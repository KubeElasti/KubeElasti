---
apiVersion: elasti.truefoundry.com/v1alpha1
kind: ElastiService
metadata:
  name: target-grpc-elastiservice
spec:
  cooldownPeriod: 300
  minTargetReplicas: 1
  scaleTargetRef:
    apiVersion: apps/v1
    kind: deployments
    name: target-grpc
  service: target-grpc
  triggers:
    - metadata:
        query: round(sum(rate(istio_requests_total{destination_service_namespace="${NAMESPACE}",reporter="destination",destination_service_name="target-grpc"}[1m])),0.001)
        serverAddress: http://prometheus-operated.monitoring.svc.cluster.local:9090
        threshold: "0.01"
      type: prometheus
  autoscaler:
    name: target-grpc-scaled-object
    type: keda
