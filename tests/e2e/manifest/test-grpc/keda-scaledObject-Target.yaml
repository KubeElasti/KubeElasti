---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: target-grpc-scaled-object
spec:
  minReplicaCount: 1
  maxReplicaCount: 5
  pollingInterval: 30
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: target-grpc
  triggers:
    - type: prometheus
      metadata:
        query: round(sum(rate(istio_requests_total{destination_service_namespace="${NAMESPACE}",reporter="destination",destination_service_name="target-grpc"}[1m])),0.001)
        serverAddress: http://prometheus-operated.monitoring.svc.cluster.local:9090
        threshold: "0.5"
