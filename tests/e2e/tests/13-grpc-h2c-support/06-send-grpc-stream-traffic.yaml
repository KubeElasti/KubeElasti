apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  # Send gRPC streaming traffic (target is already up in serve mode)
  - command: bash ../../manifest/send_grpc_traffic.sh --addr "target-grpc.$NAMESPACE.svc.cluster.local:50051" --test stream --namespace $NAMESPACE --target-resource deployments --target-name target-grpc
    namespaced: true
