apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  # Send gRPC streaming traffic through the resolver (triggers scale-up from 0).
  # This validates the H2C proxy path for server-streaming RPCs, closing the
  # coverage gap where only unary was tested through the proxy.
  - command: bash ../../manifest/send_grpc_traffic.sh --addr "target-grpc.$NAMESPACE.svc.cluster.local:50051" --test stream --namespace $NAMESPACE --target-resource deployments --target-name target-grpc
    namespaced: true
