apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  # Deploy httpbin alongside gRPC to test mixed traffic
  - command: ../../manifest/setup.sh --manifest-dir ../../manifest --namespace $NAMESPACE
    namespaced: true
  - command: sleep 5
  # Send HTTP/1.1 traffic to httpbin (should still work with H2C enabled)
  - command: bash ../../manifest/send_traffic.sh "http://target-deployment.$NAMESPACE.svc.cluster.local/status/200" --namespace $NAMESPACE --target-resource deployments --target-name target-deployment
    namespaced: true
  # Send gRPC traffic simultaneously
  - command: bash ../../manifest/send_grpc_traffic.sh --addr "target-grpc.$NAMESPACE.svc.cluster.local:50051" --test both --namespace $NAMESPACE --target-resource deployments --target-name target-grpc
    namespaced: true
