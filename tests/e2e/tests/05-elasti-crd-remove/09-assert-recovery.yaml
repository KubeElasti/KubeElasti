apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 180
commands:
  - script: |
      #!/bin/sh
      # Target must be scaled back up and actually ready -- not just "not zero".
      kubectl wait --for=condition=Ready pods -l app=target-deployment --namespace=$NAMESPACE --timeout=170s
      if [ "$?" != "0" ]; then exit 1; fi

      # The resolver hijack must be gone.
      kubectl get endpointslice elasti-target-deployment-endpointslice-to-resolver-9696239e87 --namespace=$NAMESPACE
      if [ "$?" = "0" ]; then exit 1; fi

      # The private service must be gone.
      kubectl get svc elasti-target-deployment-pvt-9696239e87 --namespace=$NAMESPACE
      if [ "$?" = "0" ]; then exit 1; fi
